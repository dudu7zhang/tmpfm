# PBMC perturbation-source metadata

# Dataset files
dataset_name: Parse_10M_PBMC_cytokines_processed_Xselected
dataset_path: ${...path.pbmc_dir}${.dataset_name}.h5ad
selected_gene_file: ${...path.selected_gene_dir}pbmc_real_selected_genes.pkl

# Columns / control semantics
pert_col: cytokine # H5 obs column for perturbations
rnaseq_batch_col: null
perturbseq_batch_col: donor
cell_type_key: null
cell_line_key: cell_type
control_pert: "PBS" # Perturbation treated as contro

# Holdout definitions
