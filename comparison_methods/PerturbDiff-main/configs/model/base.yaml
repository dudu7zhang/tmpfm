# Diffusion model and backbone defaults

# Checkpoint loading
ckpt_path: null
model_weight_ckpt_path: null

# Backbone selection
model_type: "Cross_DiT"
Block_type: MM_DiT

# DiT architecture
dit_input_size: 1
dit_depth: 8
dit_num_heads: 8
qk_norm: True

# Input/output behavior
input_dim: 2000
hidden_num: [2000,512] # [input_dim, hidden_dim]
dropout: 0.1
output_fn: "relu"

# Embedding / conditioning
use_orig_gene_count_as_emb: True
class_emb_gather_strategy: ${..cov_encoding.gather_strategy}
class_emb_hidden_dimension: ${..cov_encoding.hidden_dim}
use_gene_embedding: False
gene_embedding_type: "linear"

# Control conditioning
p_drop_cond: 0.5
p_drop_control: 0.5

# Diffusion process
steps: 1000
learn_sigma: False
sigma_small: False
noise_schedule: "linear"
noise_schedule_gamma: 0.3
use_kl: False
predict_xstart: True
rescale_timesteps: False
rescale_learned_sigmas: False

schedule_sampler: "uniform"

# Weight sharing / layer behavior
use_class_silu: false
separate_embedder: false
replace_batch_encoder: false

# Runtime-populated metadata
dataset_dict: null

# Training toggles
cutoff: 1e-4
no_mse_loss: false

# Fine-tuning layer replacement / init
replace_2kgene_layer: false
replace_1w2gene_layer: false
reinitial_adaln: false
reinitial_all: false
reinitial_all_from_scratch: false
compare_model_representation: null
